name: xchange package
permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches:
      - master
    paths:
      - 'xchange.rb'
      - '.github/workflows/xchange.yml'

  pull_request:
    paths:
      - 'xchange.rb'
      - '.github/workflows/xchange.yml'

jobs:           
  configs:
    name: Check xchange
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - description: default configuration
            option:
          - description: with documentation
            option: --with-doxygen

    steps:
      - name: Setup Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Build and install
        run: |
           brew tap attipaci/pub
           brew install xchange ${{matrix.option}}
