name: supernovas package
permissions:
  contents: write
  pull-requests: write

on:
  push:
    branches:
      - master
    paths:
      - 'supernovas.rb'
      - '.github/workflows/supernovas.yml'

  pull_request:
    paths:
      - 'supernovas.rb'
      - '.github/workflows/supernovas.yml'

jobs:           
  check:
    name: Check supernovas
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - description: default configuration
            option:
          - description: without Calceph
            option: --without-calceph
          - description: without C++
            option: --without-c++
          - description: with documentation
            option: --with-doxygen

    steps:
      - name: Setup Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Build and install
        run: |
          brew tap attipaci/pub
          brew install supernovas ${{matrix.option}}

  pkginfo:
    name: Update package info
    needs: check
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Setup Homebrew
        uses: Homebrew/actions/setup-homebrew@main
    
      - name: Checkout pkginfo branch
        uses: actions/checkout@v7
        with:
          ref: 'pkginfo'
          path: 'pkginfo'
    
      - name: Generate package info
        run: |
          brew tap attipaci/pub
          brew info --json supernovas | jq '.[0]? // .' > pkginfo/supernovas.json

      - name: Commit and Push package info
        run: |
          cd pkginfo
          git config --global user.email "$GITHUB_JOB+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions"
          git add -A
          git commit -m "automated package info update" && git push || true
