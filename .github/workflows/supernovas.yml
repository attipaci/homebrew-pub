name: supernovas package
permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches:
      - master
    paths:
      - 'supernovas.rb'
      - '.github/workflows/supernovas.yml'

  pull_request:
    paths:
      - 'supernovas.rb'
      - '.github/workflows/supernovas.yml'

jobs:           
  configs:
    name: Check supernovas
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - description: default configuration
            option:
          - description: without Calceph
            option: --without-calceph
          - description: without C++
            option: --without-c++
          - description: with CSPICE
            option: --with-cspice
          - description: with documentation
            option: --with-doxygen

    steps:
      - name: Setup Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Build and install
        run: |
           brew tap attipaci/pub
           brew install supernovas ${{matrix.option}}
